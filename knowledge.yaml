kcp_version: '0.14'
project: 'Paper 6: Geometric Operator on the Eisenstein Lattice'
description: >
  The Merkabit Riemann Spectral Program. Central object is the R/R-bar merger operator M from geometric SU(2) Hopf-paired
  spinors on the Eisenstein lattice Z[omega]. The operator M under P-gate magnetic flux insertion converges to GUE eigenvalue
  statistics, providing a geometric spectral approach to the Riemann Hypothesis. Authors: Selina Stenberg with Claude Anthropic,
  March 2026.
version: '1.0'
created: '2026-04-06'
maintainer: Selina Stenberg
units:
- id: readme
  path: README.md
  intent: >
    Entry point for Paper 6. Overview of the R/R-bar merger operator M, the Eisenstein lattice Z[omega], P-gate flux insertion,
    and GUE convergence result.
  scope: global
  audience:
  - human
  validated: '2026-04-06'
  triggers:
  - GUE
  - Riemann zeros
  - P-gate
  - Eisenstein operator
  - magnetic flux
  - Eisenstein lattice
  hints:
    load_strategy: eager
    token_estimate: 400
    priority: critical
